<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Histórico</title>
    
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Transacoes/Editar-historico.css">
</head>

<body>
    <header class="header">
        <div class="voltar">
            <img src="../../assets/icons/Vector.svg" alt="Voltar" id="img-back">
        </div>
        <h1>Editar Histórico</h1>
    </header>
    <main class="conteudo">
        <div class="card">
            <h2>Edite as Informações do Histórico</h2>

            <div class="info-item">
                <p class="label">Produto</p>
                <input type="text" class="valor" value="Papelão">
            </div>

            <div class="info-item">
                <p class="label">Peso</p>
                <input type="text" class="valor" value="500 Kg">
            </div>

            <div class="info-item">
                <p class="label">Preço</p>
                <input type="text" class="valor" value="R$ 130,00">
            </div>

            <div class="info-item">
                <p class="label">Tipo da operação</p>
                <input type="text" class="valor" value="Entrada">
            </div>

            <div class="info-item">
                <p class="label">Categoria</p>
                <input type="text" class="valor" value="Material Separado">
            </div>

            <div class="info-item">
                <p class="label">Parceiro Comercial</p>
                <input type="text" class="valor" value="Roberto">
            </div>
    </main>

    <div class="btn-primario">
        <button class="btn-primario">Editar Histórico</button>
    </div>

    <footer>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-inicio.svg" alt="Botão Inicio">
            <p>Inicio</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-estoque.svg" alt="Botão Estoque">
            <p>Estoque</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-historico.svg" alt="Botão historico">
            <p>Histórico</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-conta.svg" alt="Botão Conta">
            <p>Conta</p>
        </div>
    </footer>

    <script src="../../assets/js/Editar-historico.js"></script>
</body>

</html>
