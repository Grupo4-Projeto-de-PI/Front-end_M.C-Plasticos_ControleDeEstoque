<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <title>Listar Informações Parceiro Comercial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="filtro-preto">
        <div class="card-editar-informacoes">
            <div class="titulo-card">
                <h2>Informações do Parceiro</h1>
                    <img src="img/icon_fechar.svg" alt="Fechar Tela de Editar Informações do Parceiro">
            </div>
            <div class="card-input">
                <p>Nome do Parceiro</p>
                <h5>Roberto</h5>
            </div>
            <div class="card-input">
                <p>Telefone do Parceiro</p>
                <h5>(11) 91234-5678</h5>
            </div>
            <div class="card-input">
                <p>Tipo do Parceiro</p>
                <h5>Pessoa Física</h5>
            </div>
            <div class="card-input">
                <p>Papel Comercial do Parceiro</p>
                <h5>Fornecedor</h5>
            </div>

        </div>
    </div>
</body>

</html>
