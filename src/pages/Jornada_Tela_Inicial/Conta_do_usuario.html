<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conta do Usuário - M.C Plásticos</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/pages/Jornada_Tela_Inicial/Conta_do_usuario.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header-conta">
    <div class="saudacao-container">
      <div class="saudacao-texto">
        <h1>Olá, Ivo Santos</h1>
        <p class="subtitulo">O que vai querer mexer hoje?</p>
      </div>
      <div class="logo-container">
        <img src="../../assets/icons/icon_mc_plastico.svg" alt="M.C Plásticos Logo" class="logo-mc">
      </div>
    </div>
  </header>

  <main class="conteudo-principal">
    <div class="menu-opcoes">
      <div class="opcao-menu" data-action="perfil">
        <div class="opcao-info">
          <img src="../../assets/icons/icon_conta_sem_borda.svg" alt="Meu Perfil" class="opcao-icone">
          <span class="opcao-texto">Meu Perfil</span>
        </div>
        <img src="../../assets/icons/icon_seta_direita.svg" alt="Ir para" class="seta-direita">
      </div>

      <div class="opcao-menu" data-action="admin">
        <div class="opcao-info">
          <img src="../../assets/icons/icon_administrador.svg" alt="Tela de administrador" class="opcao-icone">
          <span class="opcao-texto">Tela de administrador</span>
        </div>
        <img src="../../assets/icons/icon_seta_direita.svg" alt="Ir para" class="seta-direita">
      </div>

      <div class="opcao-menu" data-action="manual">
        <div class="opcao-info">
          <img src="../../assets/icons/icon_manual.svg" alt="Manual de Uso" class="opcao-icone">
          <span class="opcao-texto">Manual de Uso do Sistema</span>
        </div>
        <img src="../../assets/icons/icon_seta_direita.svg" alt="Ir para" class="seta-direita">
      </div>
    </div>

    <div class="botao-sair-container">
      <button class="btn-sair-conta" data-action="logout">
        Sair da conta
      </button>
    </div>
  </main>

  <footer>
    <div class="botoes-footer" data-page="inicio">
      <img src="../../assets/icons/icon-footer-inicio.svg" alt="Botão Inicio">
      <p>Início</p>
    </div>
    <div class="botoes-footer" data-page="estoque">
      <img src="../../assets/icons/icone-estoque.svg" alt="Botão Estoque">
      <p>Estoque</p>
    </div>
    <div class="botoes-footer" data-page="historico">
      <img src="../../assets/icons/icone-historico.svg" alt="Botão Histórico">
      <p>Histórico</p>
    </div>
    <div class="botoes-footer" data-page="conta">
      <img src="../../assets/icons/icone-conta.svg" alt="Botão Conta">
      <p>Conta</p>
    </div>
  </footer>

  <script src="../../assets/js/Conta-do-usuario.js"></script>
</body>
</html>
