<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos</title>
  <link rel="stylesheet" href="../css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
 <header class="header">

  <div class="menu-row">
    <img src="../img/hambuguer-icon.svg" alt="Menu" class="menu-icon">
  </div>

  
  <div class="title-row">
    <h1>Produtos</h1>
    <div class="actions">
      <img src="../img/filtrar.png" alt="Filtrar" class="filter">
      <img src="../img/Vector.png" alt="Adicionar" class="add">
    </div>
  </div>
</header>


  <div class="search-container">
    <img src="../img/lupa.png" alt="Buscar" class="search-icon">
    <input type="text" placeholder="Buscar produto">
  </div>

    <div class="product-card">
  <img src="../img/papelao.png" alt="Papelão">
  <div class="info">
    <h2>Papelão</h2>
    <p>Preço Médio: R$ 0,40/Kg</p>
  </div>
  <span class="edit">✎</span>
</div>

    <div class="product-card">
      <img src="../img/img_latinha.png" alt="Latinha">
      <div class="info">
        <h2>Latinha</h2>
        <p>Metais<br>Preço Médio: R$ 5,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../img/aluminio.png" alt="Alumínio">
      <div class="info">
        <h2>Alumínio</h2>
        <p>Metais<br>Preço Médio: R$ 9,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../img/img_pet.png" alt="PET Laminada">
      <div class="info">
        <h2>PET Laminada</h2>
        <p>Plástico<br>Preço Médio: R$ 4,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../img/img_ppc.png" alt="PPC">
      <div class="info">
        <h2>PPC</h2>
        <p>Plástico<br>Preço Médio: R$ 8,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>


  <footer>
        <div class="botoes-footer">
            <img src="../img/icon-footer-inicio.svg" alt="Botão Inicio">
            <p>Inicio</p>
        </div>
        <div class="botoes-footer">
            <img src="../img/icon-footer-estoque.svg" alt="Botão Estoque">
            <p>Estoque</p>
        </div>
        <div class="botoes-footer">
            <img src="../img/icon-footer-historico.svg" alt="Botão historico">
            <p>Histórico</p>
        </div>
        <div class="botoes-footer">
            <img src="../img/icon-footer-conta.svg" alt="Botão Conta">
            <p>Conta</p>
        </div>
    </footer>

</body>
</html>
