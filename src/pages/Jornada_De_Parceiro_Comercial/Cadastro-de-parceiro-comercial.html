<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cadastrar Parceiro Comercial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Parceiro_Comercial/Cadastro-de-parceiro-comercial.css">
</head>
<body>
    <div class="filtro-preto">
        <div class="card-editar-informacoes">
            <div class="titulo-card">
                <h2>Cadastrar Informações do Parceiro</h1>
                <img src="./img/icon_fechar.svg" alt="Fechar Tela de Editar Informações do Parceiro">
            </div>
            <div class="card-input">
                <p>Nome do Parceiro</p>
                <input type="text" placeholder="Insira o nome do cliente">
            </div>
            <div class="card-input">
                <p>Telefone do Parceiro</p>
                <input type="text" placeholder="Insira o telefone do cliente">
            </div>
            <div class="card-select">
                <p>Tipo do Parceiro</p>
                <select name="" id="">
                    <option selected disabled value="#">Insira o tipo do cliente</option>
                    <option value="">Pessoa Física</option>
                    <option value="">Pessoa Jurídica</option>
                </select>
            </div>
            <div class="card-select">
                <p>Papel Comercial do Parceiro</p>
                <select name="" id="">
                    <option selected disabled value="#">Insira o tipo de papel comercial do parceiro</option>
                    <option value="">Fornecedor</option>
                    <option value="">Cliente</option>
                </select>
            </div>
            <div class="botao-confirmar">
                <button>Cadastrar Parceiro</button>
            </div>
        </div>
    </div>
</body>
</html>
