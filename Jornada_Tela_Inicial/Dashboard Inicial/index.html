<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inicial</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <img src="./img/hambuguer-icon.svg" alt="Menu Lateral">
        <img src="./img/logo-mc.svg" alt="Logo Mc-Plásticos">
    </header>

    <div class="dashboard-inicial">
        <div class="titulo">
            <h1>Informações de Hoje</h1>
        </div>
        <div class="informacoes-dash">
            <div class="metricas">
                <h4>Quantidade Vendida</h4>
                <h4>1 Tonelada</h4>
            </div>
            <div class="metricas">
                <h4>Quantidade Adicionada</h4>
                <h4>500 Kilogramas</h4>
            </div>
        </div>
        <div class="informacoes-dash">
            <div class="metricas">
                <h4>Estoque Baixo</h4>
                <h4>Nenhum Indice</h4>
            </div>
            <div class="metricas">
                <h4>Valor Total do Estoque</h4>
            <h4>R$ 10.000,00</h4>
            </div>
        </div>
    </div>

    <div class="botoes-acesso-rapido">
        <div class="botoes">
            <img src="./img/icon_botao_acesso_add_produto.svg" alt="Adicionar Produto">
            <p>Adicionar Produto</p>
        </div>
        <div class="botoes">
            <img src="./img/icon_botao_acesso_add_historico.svg" alt="Adicionar Produto">
            <p>Adicionar Histórico</p>
        </div>
        <div class="botoes">
            <img src="./img/icon_botao_acesso_add_ver_parceiros.svg" alt="Adicionar Produto">
            <p>Parceiros</p>
        </div>
    </div>

    <div class="historico-transacao">
        <div class="titulo">
            <h3>Histórico de Hoje</h3>
            <button>Ver Todos</button>
        </div>
        <div class="historico">
            
        </div>
    </div>
</body>

</html>
