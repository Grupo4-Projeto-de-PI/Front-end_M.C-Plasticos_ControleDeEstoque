<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Produtos/Listagem-produtos.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
 <header class="header">
  <div class="menu-row">
    <img src="../../assets/icons/hambuguer-icon.svg" alt="Menu" class="menu-icon">
  </div>

  <div class="title-row">
    <h1>Produtos</h1>
    <div class="actions">
      <img src="../../assets/icons/icone-filtro.svg" alt="Filtrar" class="filter">
      <img src="../../assets/icons/icon_add.svg" alt="Adicionar" class="add">
    </div>
  </div>
</header>

  <div class="search-container">
    <img src="../../assets/icons/icone-lupa.svg" alt="Buscar" class="search-icon">
    <input type="text" id="buscar-produto" placeholder="Buscar produto">
  </div>

  <div id="produtos-container"></div>

  <footer>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-inicio.svg" alt="Botão Inicio">
            <p>Inicio</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-estoque.svg" alt="Botão Estoque">
            <p>Estoque</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-historico.svg" alt="Botão historico">
            <p>Histórico</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-conta.svg" alt="Botão Conta">
            <p>Conta</p>
        </div>
  </footer>

  <script src="../../assets/js/Listar-produtos.js"></script>
</body>
</html>
