<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Novo Histórico</title>
    
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Transacoes/Criacao-novo-historico.css">
</head>

<body>
    <header class="header">
        <h1>Criar Novo Histórico</h1>
    </header>

    <main class="conteudo">
        <div class="card">
            <h2>Crie as Informações do Histórico</h2>
            <hr>

            <div class="info-item select-wrapper">
                <p class="label">Produto</p>
                <select class="valor">
                    <option selected>Selecione o produto</option>
                    <option>Papelão</option>
                    <option>Plástico</option>
                    <option>Vidro</option>
                </select>
                <div class="seta">
                    <img src="../../assets/icons/icon-seta-select.svg" alt="Seta">
                </div>
            </div>
            <hr>

            <div class="info-item">
                <p class="label">Peso</p>
                <input type="text" class="valor" value="Insira o peso do produto">
            </div>
            <hr>

            <div class="info-item">
                <p class="label">Preço</p>
                <input type="text" class="valor" value="Insira o preço do produto">
            </div>
            <hr>

            <div class="info-item select-wrapper">
                <p class="label">Tipo da Operação</p>
                <select class="valor">
                    <option selected>Selecione o tipo da operação</option>
                    <option>Papelão</option>
                    <option>Plástico</option>
                    <option>Vidro</option>
                </select>
                <div class="seta">
                    <img src="../../assets/icons/icon-seta-select.svg" alt="Seta">
                </div>
            </div>
            <hr>

            <div class="info-item select-wrapper">
                <p class="label">Categoria</p>
                <select class="valor">
                    <option selected>Selecione a categoria</option>
                    <option>Papelão</option>
                    <option>Plástico</option>
                    <option>Vidro</option>
                </select>
                <div class="seta">
                    <img src="../../assets/icons/icon-seta-select.svg" alt="Seta">
                </div>
            </div>
            <hr>

            <div class="info-item select-wrapper">
                <p class="label">Parceiro Comercial</p>
                <select class="valor">
                    <option selected>Selecione o parceiro comercial</option>
                    <option>Papelão</option>
                    <option>Plástico</option>
                    <option>Vidro</option>
                </select>
                <div class="seta">
                    <img src="../../assets/icons/icon-seta-select.svg" alt="Seta">
                </div>
            </div>
        </div>

        <button class="btn-secundario">Cadastrar Novo Histórico</button>
    </main>

    <footer>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-inicio.svg" alt="Botão Inicio">
            <p>Inicio</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-estoque.svg" alt="Botão Estoque">
            <p>Estoque</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-historico.svg" alt="Botão historico">
            <p>Histórico</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-conta.svg" alt="Botão Conta">
            <p>Conta</p>
        </div>
    </footer>
</body>
</html>
