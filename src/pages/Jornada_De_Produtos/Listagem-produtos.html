<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Produtos/Listagem-produtos.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
 <header class="header">

  <div class="menu-row">
    <img src="../../assets/icons/hambuguer-icon.svg" alt="Menu" class="menu-icon">
  </div>

  
  <div class="title-row">
    <h1>Produtos</h1>
    <div class="actions">
      <img src="../../assets/icons/icone-filtro.svg" alt="Filtrar" class="filter">
      <img src="../../assets/icons/icon_add.svg" alt="Adicionar" class="add">
    </div>
  </div>
</header>


  <div class="search-container">
    <img src="../../assets/icons/icone-lupa.svg" alt="Buscar" class="search-icon">
    <input type="text" placeholder="Buscar produto">
  </div>

    <div class="product-card">
  <img src="../../assets/icons/papelao.svg" alt="Papelão">
  <div class="info">
    <h2>Papelão</h2>
    <p>Preço Médio: R$ 0,40/Kg</p>
  </div>
  <span class="edit">✎</span>
</div>

    <div class="product-card">
      <img src="../../assets/icons/latinha.svg" alt="Latinha">
      <div class="info">
        <h2>Latinha</h2>
        <p>Metais<br>Preço Médio: R$ 5,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../../assets/icons/aluminio.svg" alt="Alumínio">
      <div class="info">
        <h2>Alumínio</h2>
        <p>Metais<br>Preço Médio: R$ 9,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../../assets/icons/pet-laminada.svg" alt="PET Laminada">
      <div class="info">
        <h2>PET Laminada</h2>
        <p>Plástico<br>Preço Médio: R$ 4,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>

    <div class="product-card">
      <img src="../../assets/icons/PPC.svg" alt="PPC">
      <div class="info">
        <h2>PPC</h2>
        <p>Plástico<br>Preço Médio: R$ 8,00/Kg</p>
      </div>
      <span class="edit">✎</span>
    </div>


  <footer>
        <div class="botoes-footer">
            <img src="../../assets/icons/icon-footer-inicio.svg" alt="Botão Inicio">
            <p>Inicio</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-estoque.svg" alt="Botão Estoque">
            <p>Estoque</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-historico.svg" alt="Botão historico">
            <p>Histórico</p>
        </div>
        <div class="botoes-footer">
            <img src="../../assets/icons/icone-conta.svg" alt="Botão Conta">
            <p>Conta</p>
        </div>
    </footer>

</body>
</html>
