<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - M.C Plásticos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pages/Jornada_Tela_Inicial/Login_de_usuario.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="../../assets/img/logo/McLogo.svg" alt="">
        </div>

        <h1>Bem-vindo(a) de volta!</h1>

        <form>
            <label for="codigo">Código Funcionário</label>
            <input type="text" id="codigo" placeholder="Insira o código de funcionário">

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Insira a sua senha">

            <button type="submit">Entrar no sistema</button>
        </form>
    </div>
</body>
</html>
