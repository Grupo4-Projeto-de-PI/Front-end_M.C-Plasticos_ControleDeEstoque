<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Informações Parceiro Comercial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/pages/Jornada_De_Parceiro_Comercial/Editar-informacoes.css">
</head>

<body>
    <div class="filtro-preto">
        <div class="card-editar-informacoes">
            <div class="titulo-card">
                <h2>Editar Informações do Parceiro</h1>
                    <img src="../../assets/icons/icon_fechar.svg" alt="Fechar Tela de Editar Informações do Parceiro">
            </div>
            <div class="card-input">
                <p>Nome do Parceiro</p>
                <input id="nomeParceiro" type="text" value="Roberto">
            </div>
            <div class="card-input">
                <p>Telefone do Parceiro</p>
                <input id="telefoneParceiro" type="text" value="(11) 91234-5678">
            </div>
            <div class="card-select">
                <p>Tipo do Parceiro</p>
                <select id="tipoParceiro">
                    <option value="Pessoa Física">Pessoa Física</option>
                    <option value="Pessoa Jurídica">Pessoa Jurídica</option>
                </select>
            </div>
            <div class="card-select">
                <p>Papel Comercial do Parceiro</p>
                <select id="papelParceiro">
                    <option value="Fornecedor">Fornecedor</option>
                    <option value="Cliente">Cliente</option>
                </select>
            </div>
            <div class="botao-confirmar">
                <button id="btnEditar">Editar Informações</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/Editar-informacoes-parceiro.js"></script>

</body>

</html>
