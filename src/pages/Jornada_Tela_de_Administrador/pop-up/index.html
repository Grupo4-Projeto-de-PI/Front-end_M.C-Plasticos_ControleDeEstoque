<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, height=852, initial-scale=1.0">
  <title>Popup de Confirmação</title>
  <link rel="stylesheet" href="./css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Parkinsans:wght@300..800&display=swap"
        rel="stylesheet">
</head>
<body>

  <div class="device">
    <div class="overlay" id="overlay">
      <div class="popup">
        <span class="close" id="closeBtn">&times;</span>
        <img src="./img/icon_check.png" alt="Checkmark">
        <div class="fonte"><p>Funcionário cadastrado com sucesso</p></div>
      </div>
    </div>
  </div>
</body>
</html>
